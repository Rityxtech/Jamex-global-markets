<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <title>Jamex Global Markets | Institutional Wealth Management</title>
    <!-- SPA redirect decode: restores URL from 404.html redirect -->
    <script>
      (function() {
        var redirect = sessionStorage.redirect;
        delete sessionStorage.redirect;
        if (redirect && redirect !== location.href) {
          history.replaceState(null, null, redirect);
        }
        // Also handle the ?p= query param method
        var l = window.location;
        if (l.search.startsWith('?p=/')) {
          var decoded = l.search.slice(3).split('&').map(function(s) {
            return s.replace(/~and~/g, '&');
          });
          history.replaceState(null, null,
            l.pathname.slice(0, -1) + decoded[0] +
            (decoded[1] ? '?' + decoded[1] : '') +
            l.hash
          );
        }
      })();
    </script>
  </head>
  <body class="bg-[#0B1120] text-white">
    <!-- Global Mesh Background Layers -->
    <div class="fixed inset-0 z-0 pointer-events-none" style="background-image: linear-gradient(to right, rgba(255,255,255,0.06) 1px, transparent 1px), linear-gradient(to bottom, rgba(255,255,255,0.06) 1px, transparent 1px), radial-gradient(circle at center, rgba(255,255,255,0.25) 1px, transparent 1.5px); background-size: 40px 40px, 40px 40px, 40px 40px; background-position: -1px -1px, -1px -1px, -1.5px -1.5px;"></div>
    <div class="fixed top-[-10%] left-[-10%] w-[500px] h-[500px] rounded-full bg-[#2563EB]/15 blur-[150px] pointer-events-none z-0"></div>
    <div class="fixed bottom-[-10%] right-[-10%] w-[600px] h-[600px] rounded-full bg-white/5 blur-[150px] pointer-events-none z-0"></div>

    <div id="root" class="relative z-10"></div>
    <script type="module" src="./src/main.tsx"></script>
  </body>
</html>
