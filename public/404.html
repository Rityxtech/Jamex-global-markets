<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <script>
      // SPA redirect trick for both GitHub Pages (subpath) and Vercel (root).
      var l = window.location;
      var segments = l.pathname.split('/').filter(Boolean);
      var knownPaths = ['about','plans','login','register','dashboard','invest','wallet','deposit','withdraw','confirm-investment','forgot-password','reset-password','kyc','referral','transactions','support','settings','profile','loans','admin'];
      var isRootDeploy = segments.length > 0 && knownPaths.includes(segments[0]);

      if (isRootDeploy) {
        // Vercel / root deployment: redirect to /?p=/path
        l.replace(
          l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
          '/?p=/' + segments.join('/').replace(/&/g, '~and~') +
          (l.search ? '&q=' + l.search.slice(1).replace(/&/g, '~and~') : '') +
          l.hash
        );
      } else {
        // GitHub Pages / subpath deployment
        l.replace(
          l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
          l.pathname.split('/').slice(0, 1 + 1).join('/') + '/?p=/' +
          l.pathname.slice(1).split('/').slice(1).join('/').replace(/&/g, '~and~') +
          (l.search ? '&q=' + l.search.slice(1).replace(/&/g, '~and~') : '') +
          l.hash
        );
      }
    </script>
  </head>
  <body></body>
</html>
